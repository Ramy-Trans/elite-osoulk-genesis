[build]
  command   = "npm run build"
  publish   = "dist/client"

[build.environment]
  NODE_VERSION = "20"

# Proxy /api/* to the Replit backend — keeps the same origin so no CORS issues.
# Update this URL if you redeploy to a new Replit instance.
[[redirects]]
  from   = "/api/*"
  to     = "https://elite-osoulk-genesis--ajkdbawjkldb.replit.app/api/:splat"
  status = 200
  force  = true

# SPA fallback — every client-side route serves index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection       = "1; mode=block"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

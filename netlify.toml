[build]
  command   = "npm run build"
  publish   = "dist/client"

[build.environment]
  NODE_VERSION  = "20"
  VITE_API_BASE = ""

[functions]
  node_bundler           = "esbuild"
  external_node_modules  = ["pg", "pg-native", "mysql2"]

# API requests → Netlify Function (Express API runs serverless here)
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api"
  status = 200
  force  = true

# SPA fallback — every client-side route serves index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection       = "1; mode=block"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
